x-airflow-common: &airflow-common
  build:
    context: .
  image: ${AIRFLOW_IMAGE:-stocksearcher-airflow:local}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-airflow}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres/${POSTGRES_DB:-airflow}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__WEBSERVER__WORKERS: "1"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Seoul
    CHROME_BIN: /usr/bin/chromium
    CHROMEDRIVER_PATH: /usr/bin/chromedriver
    OUTPUT_DIR: /opt/stock-data
    STOCK_DB_HOST: postgres
    STOCK_DB_PORT: "5432"
    STOCK_DB_NAME: stock
    STOCK_DB_USER: ${STOCK_DB_USER:-stock_app}
    STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD:?set STOCK_DB_PASSWORD in .env}
    STOCK_START_DATE: "2023-01-01"
    STOCK_END_DATE: "2099-12-31"
    STOCK_PERIOD: "3"
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./data:/opt/stock-data
    - ./src:/opt/stocksearcher:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
      STOCK_DB_USER: ${STOCK_DB_USER:-stock_app}
      STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD:?set STOCK_DB_PASSWORD in .env}
    volumes:
      - ./postgressql:/var/lib/postgresql/data
      - ./src/database/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -ec
      - |
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD:-airflow}" \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.invalid || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?set AIRFLOW_ADMIN_PASSWORD in .env}

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8974/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  viewer:
    build:
      context: ./src/viewer
    image: ${VIEWER_IMAGE:-stocksearcher-viewer:local}
    environment:
      STOCK_DB_HOST: postgres
      STOCK_DB_PORT: "5432"
      STOCK_DB_NAME: stock
      STOCK_DB_USER: ${STOCK_DB_USER:-stock_app}
      STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD:?set STOCK_DB_PASSWORD in .env}
    ports:
      - "${VIEWER_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-db-volume:
