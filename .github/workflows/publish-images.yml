name: Publish container images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  AIRFLOW_IMAGE: ghcr.io/nowonbun/stockersearcher_v2-airflow
  VIEWER_IMAGE: ghcr.io/nowonbun/stockersearcher_v2-viewer
  POSTGRES_IMAGE: ghcr.io/nowonbun/stockersearcher_v2-postgres

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push Airflow image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.AIRFLOW_IMAGE }}:sha-${{ github.sha }}
            ${{ env.AIRFLOW_IMAGE }}:main
      - name: Build and push viewer image
        uses: docker/build-push-action@v6
        with:
          context: ./src/viewer
          push: true
          tags: |
            ${{ env.VIEWER_IMAGE }}:sha-${{ github.sha }}
            ${{ env.VIEWER_IMAGE }}:main
      - name: Build and push PostgreSQL initialization image
        uses: docker/build-push-action@v6
        with:
          context: ./src/database/init
          push: true
          tags: |
            ${{ env.POSTGRES_IMAGE }}:sha-${{ github.sha }}
            ${{ env.POSTGRES_IMAGE }}:main
