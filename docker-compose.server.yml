x-airflow-common: &airflow-common
  image: ${AIRFLOW_IMAGE:?set AIRFLOW_IMAGE in .env.server}
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:?set POSTGRES_USER in .env.server}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.server}@postgres/${POSTGRES_DB:?set POSTGRES_DB in .env.server}
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "false"
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "true"
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Asia/Seoul
    CHROME_BIN: /usr/bin/chromium
    CHROMEDRIVER_PATH: /usr/bin/chromedriver
    OUTPUT_DIR: /opt/stock-data
    STOCK_DB_HOST: postgres
    STOCK_DB_PORT: "5432"
    STOCK_DB_NAME: stock
    STOCK_DB_USER: ${STOCK_DB_USER:?set STOCK_DB_USER in .env.server}
    STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD:?set STOCK_DB_PASSWORD in .env.server}
    STOCK_START_DATE: "2023-01-01"
    STOCK_END_DATE: "2099-12-31"
    STOCK_PERIOD: "3"
    PYTHONUNBUFFERED: "1"
  volumes:
    - airflow-logs:/opt/airflow/logs
    - stock-data:/opt/stock-data
    - ${MODEL_DIR:?set MODEL_DIR in .env.server}:/opt/stocksearcher/models:ro
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: ${POSTGRES_IMAGE:?set POSTGRES_IMAGE in .env.server}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env.server}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.server}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env.server}
      STOCK_DB_USER: ${STOCK_DB_USER:?set STOCK_DB_USER in .env.server}
      STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD:?set STOCK_DB_PASSWORD in .env.server}
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -ec
      - |
        airflow db migrate
        airflow users create \
          --username "$${_AIRFLOW_WWW_USER_USERNAME:-airflow}" \
          --password "$${_AIRFLOW_WWW_USER_PASSWORD}" \
          --firstname Airflow \
          --lastname Admin \
          --role Admin \
          --email admin@example.invalid || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:?set AIRFLOW_ADMIN_PASSWORD in .env.server}

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8974/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  viewer:
    image: ${VIEWER_IMAGE:?set VIEWER_IMAGE in .env.server}
    environment:
      STOCK_DB_HOST: postgres
      STOCK_DB_PORT: "5432"
      STOCK_DB_NAME: stock
      STOCK_DB_USER: ${STOCK_DB_USER:?set STOCK_DB_USER in .env.server}
      STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD:?set STOCK_DB_PASSWORD in .env.server}
    ports:
      - "${VIEWER_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  airflow-logs:
  stock-data:
  postgres-db-volume:
